<!DOCTYPE html>
<html>
<head>
  <title>Chess Game</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
      color: white;
      font-family: Arial;
      overflow: hidden;
    }

    .container {
      text-align: center;
      animation: fadeIn 2s ease;
    }

    h1 {
      font-size: 50px;
      margin-bottom: 20px;
      animation: slideDown 1.5s ease;
    }

    button {
      padding: 15px 40px;
      font-size: 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;

      background: #ffcc00;
      color: black;

      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px #ffcc00;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideDown {
      from { transform: translateY(-100px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

  </style>
</head>

<body>

  <div class="container">
    <h1>♟️ Play Chess</h1>
    <input type="text" id="p1" placeholder="Enter Player 1 (White)">
    <br><br>
    <input type="text" id="p2" placeholder="Enter Player 2 (Black)">
    <br><br>
    <button onclick="startGame()">Start Game</button>
  </div>

  <script>
    function startGame() {
        const p1 = document.getElementById("p1").value || "Player 1";
        const p2 = document.getElementById("p2").value || "Player 2";

        // store names
        localStorage.setItem("player1", p1);
        localStorage.setItem("player2", p2);

        window.location.href = "game.html";
    }
  </script>

</body>
</html>
